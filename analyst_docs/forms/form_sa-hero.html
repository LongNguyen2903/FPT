<!-- ① Hero Banner (SA) -->
<div id="ldpsec-sa-hero" class="ldp-sec-form" style="padding:20px; display:none;">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px 16px;">
        <div class="form-group">
            <label>Background fullscreen (1920&#215;1080px)</label>
            <div class="media-upload-wrapper" style="display:flex; gap:8px; align-items:center; width:100%;">
                <input type="text" class="form-input media-url" placeholder="URL &#7843;nh n&#7873;n" style="flex:1;">
                <input type="file" class="media-file-input" style="display:none;" accept="image/*" onchange="ldpHandleFileUpload(this)">
                <button class="btn btn-secondary btn-sm" onclick="this.previousElementSibling.click()">Upload</button>
            </div>
        </div>
        <div class="form-group">
            <label>&#7842;nh thi&#7871;t b&#7883; / s&#7843;n ph&#7849;m (b&#234;n ph&#7843;i hero)</label>
            <div class="media-upload-wrapper" style="display:flex; gap:8px; align-items:center; width:100%;">
                <input type="text" class="form-input media-url" placeholder="URL &#7843;nh thi&#7871;t b&#7883;" style="flex:1;">
                <input type="file" class="media-file-input" style="display:none;" accept="image/*" onchange="ldpHandleFileUpload(this)">
                <button class="btn btn-secondary btn-sm" onclick="this.previousElementSibling.click()">Upload</button>
            </div>
        </div>

        <div class="form-group">
            <label>Text Nút CTA chính</label>
            <input type="text" class="form-input" value="Đăng ký ngay">
        </div>
        <div class="form-group">
            <label>URL Nút CTA chính</label>
            <input type="text" class="form-input" value="/dang-ky-sa">
        </div>
        <div class="form-group">
            <label>Text Nút CTA phụ</label>
            <input type="text" class="form-input" value="Nhận tư vấn">
        </div>
        <div class="form-group">
            <label>URL Nút CTA phụ</label>
            <input type="text" class="form-input" value="/nhan-tu-van-sa">
        </div>
    </div>
</div>
