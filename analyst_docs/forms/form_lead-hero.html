<!-- ① Hero + Form thu Lead (Thu Lead) -->
<div id="ldpsec-lead-hero" class="ldp-sec-form" style="padding:20px; display:none;">
    <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Background & Hình ảnh</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px 16px;">
        <div class="form-group"><label>Background Image Desktop (1920x1080px) <span style="color:var(--danger)">*</span></label>
            <div class="media-upload-wrapper" style="display:flex; gap:8px; align-items:center; width:100%;">
                <input type="text" class="form-input media-url" placeholder="URL ảnh nền Desktop" style="flex:1;">
                <input type="file" class="media-file-input" style="display:none;" accept="image/*" onchange="ldpHandleFileUpload(this)">
                <button class="btn btn-secondary btn-sm" onclick="this.previousElementSibling.click()">Upload</button>
                <div class="media-preview" style="width:40px; height:40px; border-radius:4px; border:1px solid var(--border-glass); background:rgba(0,0,0,0.2); display:none; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; position:relative;">
                    <img src="" style="width:100%; height:100%; object-fit:cover;">
                    <span style="position:absolute; top:-2px; right:-2px; background:rgba(239,68,68,0.85); color:#fff; font-size:8px; width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="ldpRemoveUploadedFile(this)">✕</span>
                </div>
            </div>
        </div>
        <div class="form-group"><label>Background Image Mobile (768x1080px)</label>
            <div class="media-upload-wrapper" style="display:flex; gap:8px; align-items:center; width:100%;">
                <input type="text" class="form-input media-url" placeholder="URL ảnh nền Mobile" style="flex:1;">
                <input type="file" class="media-file-input" style="display:none;" accept="image/*" onchange="ldpHandleFileUpload(this)">
                <button class="btn btn-secondary btn-sm" onclick="this.previousElementSibling.click()">Upload</button>
                <div class="media-preview" style="width:40px; height:40px; border-radius:4px; border:1px solid var(--border-glass); background:rgba(0,0,0,0.2); display:none; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; position:relative;">
                    <img src="" style="width:100%; height:100%; object-fit:cover;">
                    <span style="position:absolute; top:-2px; right:-2px; background:rgba(239,68,68,0.85); color:#fff; font-size:8px; width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="ldpRemoveUploadedFile(this)">✕</span>
                </div>
            </div>
        </div>
    </div>
    <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin:16px 0 12px;">Nội dung chính</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px 16px;">
        <div class="form-group" style="grid-column: span 2;"><label>Headline chính bên trái (H1) <span style="color:var(--danger)">*</span></label>
            <input type="text" class="form-input" value="Internet tốc độ 1 Gbps – Lắp trong ngày, dùng ngay tối nay">
        </div>
        <div class="form-group" style="grid-column: span 2;"><label>Nhãn phụ / USP nhỏ</label>
            <input type="text" class="form-input" value="Tặng modem Wifi 6 trị giá 2 triệu, bảo hành thiết bị 24 tháng.">
        </div>
        <div class="form-group"><label>Text Nút CTA chính</label><input type="text" class="form-input" value="Đăng ký ngay"></div>
        <div class="form-group"><label>URL Nút CTA chính</label><input type="text" class="form-input" value="#hero-section"></div>
        <div class="form-group"><label>Text Nút CTA phụ</label><input type="text" class="form-input" value="Nhận tư vấn"></div>
        <div class="form-group"><label>URL Nút CTA phụ</label><input type="text" class="form-input" value="#hero-section"></div>
    </div>
</div>
