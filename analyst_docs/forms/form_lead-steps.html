<!-- ④ Giá ưu đãi, nhiều tiện ích (Thu Lead) -->
<div id="ldpsec-lead-steps" class="ldp-sec-form" style="padding:20px; display:none;">
    <div class="form-group" style="margin-bottom:16px;">
        <label>Tiêu đề Section Lợi ích</label>
        <input type="text" class="form-input" value="6 lý do 3 triệu gia đình tin chọn FPT Telecom">
    </div>

    <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">
        Cấu hình Lợi ích nổi bật
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <!-- Mục Lợi ích 1 -->
        <div style="border:1px solid var(--border); border-radius:8px; padding:12px; background:var(--bg-secondary);">
            <div class="form-group" style="margin-bottom:8px;">
                <label style="font-size:11px;">Icon Lợi ích 1</label>
                <div class="media-upload-wrapper" style="display:flex; gap:8px; align-items:center; width:100%;">
                    <input type="text" class="form-input media-url" value="/media/uploads/icon-speed.png" style="flex:1;">
                    <input type="file" class="media-file-input" style="display:none;" accept="image/*" onchange="ldpHandleFileUpload(this)">
                    <button class="btn btn-secondary btn-sm" onclick="this.previousElementSibling.click()">Upload</button>
                    <div class="media-preview" style="width:30px; height:30px; border-radius:4px; border:1px solid var(--border-glass); background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; position:relative; margin-top:4px;">
                        <img src="/media/uploads/icon-speed.png" style="width:100%; height:100%; object-fit:cover;">
                        <span style="position:absolute; top:-2px; right:-2px; background:rgba(239,68,68,0.85); color:#fff; font-size:8px; width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="ldpRemoveUploadedFile(this)">✕</span>
                    </div>
                </div>
            </div>
            <div class="form-group" style="margin-bottom:8px;">
                <label style="font-size:11px;">Tiêu đề lợi ích 1</label>
                <input type="text" class="form-input" value="Băng thông 1Gbps">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label style="font-size:11px;">Mô tả chi tiết 1</label>
                <textarea class="form-textarea" rows="2">Tốc độ vượt trội, tải file cực nhanh, xem phim 4K không giật lag.</textarea>
            </div>
        </div>

        <!-- Mục Lợi ích 2 -->
        <div style="border:1px solid var(--border); border-radius:8px; padding:12px; background:var(--bg-secondary);">
            <div class="form-group" style="margin-bottom:8px;">
                <label style="font-size:11px;">Icon Lợi ích 2</label>
                <div class="media-upload-wrapper" style="display:flex; gap:8px; align-items:center; width:100%;">
                    <input type="text" class="form-input media-url" value="/media/uploads/icon-wifi6.png" style="flex:1;">
                    <input type="file" class="media-file-input" style="display:none;" accept="image/*" onchange="ldpHandleFileUpload(this)">
                    <button class="btn btn-secondary btn-sm" onclick="this.previousElementSibling.click()">Upload</button>
                    <div class="media-preview" style="width:30px; height:30px; border-radius:4px; border:1px solid var(--border-glass); background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; position:relative; margin-top:4px;">
                        <img src="/media/uploads/icon-wifi6.png" style="width:100%; height:100%; object-fit:cover;">
                        <span style="position:absolute; top:-2px; right:-2px; background:rgba(239,68,68,0.85); color:#fff; font-size:8px; width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="ldpRemoveUploadedFile(this)">✕</span>
                    </div>
                </div>
            </div>
            <div class="form-group" style="margin-bottom:8px;">
                <label style="font-size:11px;">Tiêu đề lợi ích 2</label>
                <input type="text" class="form-input" value="Công nghệ Wi-Fi 6">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label style="font-size:11px;">Mô tả chi tiết 2</label>
                <textarea class="form-textarea" rows="2">Độ phủ rộng, khả năng chịu tải tốt và kết nối nhiều thiết bị cùng lúc.</textarea>
            </div>
        </div>

        <!-- Mục Lợi ích 3 -->
        <div style="border:1px solid var(--border); border-radius:8px; padding:12px; background:var(--bg-secondary);">
            <div class="form-group" style="margin-bottom:8px;">
                <label style="font-size:11px;">Icon Lợi ích 3</label>
                <div class="media-upload-wrapper" style="display:flex; gap:8px; align-items:center; width:100%;">
                    <input type="text" class="form-input media-url" value="/media/uploads/icon-ping.png" style="flex:1;">
                    <input type="file" class="media-file-input" style="display:none;" accept="image/*" onchange="ldpHandleFileUpload(this)">
                    <button class="btn btn-secondary btn-sm" onclick="this.previousElementSibling.click()">Upload</button>
                    <div class="media-preview" style="width:30px; height:30px; border-radius:4px; border:1px solid var(--border-glass); background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; position:relative; margin-top:4px;">
                        <img src="/media/uploads/icon-ping.png" style="width:100%; height:100%; object-fit:cover;">
                        <span style="position:absolute; top:-2px; right:-2px; background:rgba(239,68,68,0.85); color:#fff; font-size:8px; width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="ldpRemoveUploadedFile(this)">✕</span>
                    </div>
                </div>
            </div>
            <div class="form-group" style="margin-bottom:8px;">
                <label style="font-size:11px;">Tiêu đề lợi ích 3</label>
                <input type="text" class="form-input" value="Độ trễ cực thấp 0.016s">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label style="font-size:11px;">Mô tả chi tiết 3</label>
                <textarea class="form-textarea" rows="2">Độ trễ thấp tối ưu cho game thủ, họp video không đứt quãng.</textarea>
            </div>
        </div>

        <!-- Mục Lợi ích 4 -->
        <div style="border:1px solid var(--border); border-radius:8px; padding:12px; background:var(--bg-secondary);">
            <div class="form-group" style="margin-bottom:8px;">
                <label style="font-size:11px;">Icon Lợi ích 4</label>
                <div class="media-upload-wrapper" style="display:flex; gap:8px; align-items:center; width:100%;">
                    <input type="text" class="form-input media-url" value="/media/uploads/icon-tech.png" style="flex:1;">
                    <input type="file" class="media-file-input" style="display:none;" accept="image/*" onchange="ldpHandleFileUpload(this)">
                    <button class="btn btn-secondary btn-sm" onclick="this.previousElementSibling.click()">Upload</button>
                    <div class="media-preview" style="width:30px; height:30px; border-radius:4px; border:1px solid var(--border-glass); background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; position:relative; margin-top:4px;">
                        <img src="/media/uploads/icon-tech.png" style="width:100%; height:100%; object-fit:cover;">
                        <span style="position:absolute; top:-2px; right:-2px; background:rgba(239,68,68,0.85); color:#fff; font-size:8px; width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="ldpRemoveUploadedFile(this)">✕</span>
                    </div>
                </div>
            </div>
            <div class="form-group" style="margin-bottom:8px;">
                <label style="font-size:11px;">Tiêu đề lợi ích 4</label>
                <input type="text" class="form-input" value="Hỗ trợ kỹ thuật 24/7 tận nơi">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label style="font-size:11px;">Mô tả chi tiết 4</label>
                <textarea class="form-textarea" rows="2">Đội ngũ chuyên nghiệp luôn sẵn sàng hỗ trợ bạn bất kể thời gian nào trong ngày.</textarea>
            </div>
        </div>
    </div>
</div>
